
<svg width="300" height="195" viewBox="0 0 300 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
    <style>
        .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #41b883;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
        }
        @supports(-moz-appearance: auto) {
             
            .header { font-size: 15.5px; }
        }

        @keyframes slideInAnimation {
            from {
                width: 0;
            }
            to {
                width: calc(100%-100px);
            }
        }
        @keyframes growWidthAnimation {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
        .stat {
            font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #fffefe;
        }
        @supports(-moz-appearance: auto) {
             
            .stat { font-size:12px; }
        }
        .bold { font-weight: 700 }
        .lang-name {
            font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
            fill: #fffefe;
        }
        .stagger {
            opacity: 0;
            animation: fadeInAnimation 0.3s ease-in-out forwards;
        }
        #rect-mask rect{
            animation: slideInAnimation 1s ease-in-out forwards;
        }
        .lang-progress{
            animation: growWidthAnimation 0.6s ease-in-out forwards;
        }



         
        @keyframes scaleInAnimation {
            from {
                transform: translate(-5px, 5px) scale(0);
            }
            to {
                transform: translate(-5px, 5px) scale(1);
            }
        }
        @keyframes fadeInAnimation {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
    <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4e2e2" width="299" fill="#273849" stroke-opacity="0"/>
    <g transform="translate(25, 35)">
        <g transform="translate(0, 0)">
            <text x="0" y="0" class="header">Most Used Languages</text>
        </g>
    </g>

    <g transform="translate(0, 55)">
        <svg x="25">
            <mask id="rect-mask">
                <rect x="0" y="0" width="250" height="8" fill="white" rx="5"/>
            </mask>
            
                <rect mask="url(#rect-mask)" x="0" y="0" width="175.1743803336177" height="8" fill="#4F5D95"/>
            
                <rect mask="url(#rect-mask)" x="175.1743803336177" y="0" width="35.895929698823096" height="8" fill="#00ADD8"/>
            
                <rect mask="url(#rect-mask)" x="211.0703100324408" y="0" width="20.285827299267055" height="8" fill="#f1e05a"/>
            
                <rect mask="url(#rect-mask)" x="231.35613733170786" y="0" width="12.600694864672597" height="8" fill="#3178c6"/>
            
                <rect mask="url(#rect-mask)" x="243.95683219638045" y="0" width="3.0588509642206687" height="8" fill="#a56de2"/>
            
                <rect mask="url(#rect-mask)" x="247.01568316060113" y="0" width="1.7489690676002372" height="8" fill="#007800"/>
            
                <rect mask="url(#rect-mask)" x="248.76465222820136" y="0" width="0.6538340058623672" height="8" fill="#878787"/>
            
                <rect mask="url(#rect-mask)" x="249.41848623406372" y="0" width="0.5815137659362813" height="8" fill="#ff9900"/>
            

            <g transform="translate(0, 25)">
                <g transform="translate(0, 0)">
                    
                        <g transform="translate(0, 0)">
                            <g class="stagger" style="animation-delay: 450ms">
                                <circle cx="5" cy="6" r="5" fill="#4F5D95" />
                                <text x="15" y="10" class='lang-name'>
                                    PHP 70.07%
                                </text>
                            </g>
                        </g>
                    
                        <g transform="translate(0, 25)">
